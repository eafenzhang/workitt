name: Build Windows App

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Auto-bump version
        shell: bash
        run: node -e "const p=require('./package.json');p.version='1.0.'+process.env.GITHUB_RUN_NUMBER;require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"

      - name: Get version
        id: version
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Sync Tauri version
        shell: bash
        run: node -e "const p=require('./package.json');const t=require('./src-tauri/tauri.conf.json');t.version=p.version;require('fs').writeFileSync('./src-tauri/tauri.conf.json',JSON.stringify(t,null,2)+'\n')"

      - name: Build Tauri app
        run: npx tauri build

      - name: Find artifacts
        id: artifacts
        shell: bash
        run: |
          NSIS=$(ls src-tauri/target/release/bundle/nsis/*.exe 2>/dev/null | head -1)
          MSI=$(ls src-tauri/target/release/bundle/msi/*.msi 2>/dev/null | head -1)
          echo "nsis=$NSIS" >> $GITHUB_OUTPUT
          echo "msi=$MSI" >> $GITHUB_OUTPUT

      - name: Release
        uses: softprops/action-gh-release@v2.6.2
        if: success() && startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Workitt v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            ${{ steps.artifacts.outputs.nsis }}
            ${{ steps.artifacts.outputs.msi }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
