<!DOCTYPE html>
<html>
<head><meta charset="utf-8">
<style>
  *{margin:0;padding:0}
  html,body{background:transparent;overflow:hidden;width:56px;height:56px}
  button{
    width:42px;height:42px;border-radius:50%;border:none;background:#1a1a2e;color:#fff;
    cursor:pointer;display:flex;align-items:center;justify-content:center;margin:7px;
    box-shadow:0 2px 12px rgba(0,0,0,0.3);transition:transform 0.2s
  }
  button:hover{transform:scale(1.1)}
  svg{width:22px;height:22px}
</style></head>
<body>
  <button onclick="window.electronAPI.openQCForm()">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
      <rect x="9" y="9" width="13" height="13" rx="2"/>
      <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
    </svg>
  </button>
</body>
</html>
